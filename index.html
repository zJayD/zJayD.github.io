<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xxxx Limited Edition</title>
  <style>

    .cart-btn-wrapper {
      position: absolute;
      top: 20px;
      right: 24px;
      z-index: 10;
      display: flex;
      gap: 20px; /* Adds spacing between the two buttons */
    }

    .cart-btn {
      width: 32px;
      height: 32px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .warning-msg {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff3b3b;
      color: white;
      margin: 0;
      font-weight: 600;
      padding: 0px 16px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      font-size: 0.95rem;
      text-align: center;
      white-space: nowrap;
      z-index: 20;
    }

    .warning-msg p {
     margin: 8px;
    }

    @keyframes containerShake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }

    .container.shake {
      animation: containerShake 0.3s ease;
    }

    /* === GENERAL STYLING === */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #f0f0f0, #e4e4e4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;

      animation: fadeIn 0.8s ease-in-out both;
    }


    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container {
      position: relative; 
      background: #f5f5f5;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      max-width: 380px;
      width: 90%;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .image-wrapper {
      position: relative;
      display: inline-block;
      width: 330px;
      height: 300px;
      overflow: hidden;
      border-radius: 10px;
      margin: 0 auto 16px;
      margin-top: 40px;
     }

    .product-image {
      width: 100%;
      height: 100%;
      scale: 120%;
      object-fit: cover;
      animation: imageScaleIn 1.2s ease-out;
      transform-origin: center;
      display: block;
    }

    @keyframes imageScaleIn {
      0% {
        transform: scale(1.6);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .discount-sticker {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: #d50000;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      z-index: 10;
      letter-spacing: 0.5px;

      opacity: 0;
      transform: translateX(-20px);
      animation: stickerSlideIn 0.7s ease-out 0.3s forwards;
    } 

    @keyframes stickerSlideIn {
      0% {
        transform: translateX(50px);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .product-title {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 8px;
      color: #222;
    }

    .product-description {
      font-size: 1rem;
      color: rgba(255, 0, 0, 1);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .product-price {
      margin-bottom: 20px;
      font-size: 1.4rem;
    }

    .original-price {
      text-decoration: line-through;
      color: #bbb;
      margin-right: 8px;
      font-size: 1rem;
    }

    .discounted-price {
      position: relative;
      color: #000000;
      font-weight: 700;
      font-size: 2rem;
      animation: fadeIn 1s ease-in-out 0.3s both;
    }

    /* Underline animation */
    .discounted-price::after {
      content: "";
      position: absolute;
      bottom: -4px;
      left: 0;
      height: 3px;
      width: 0%;
      background-color: rgba(255, 0, 0, 1);
      animation: underlineSlideIn 1s ease-out 0.5s forwards;
    }

    @keyframes underlineSlideIn {
      0% {
        width: 0%;
      }
      100% {
        width: 100%;
      }
    }


    .countdown {
      font-size: 1.2rem;
      font-weight: bold;
      color: rgba(255, 0, 0, 1);
      margin-bottom: 20px;
      animation: pulse 0.5s infinite alternate ease-in-out;
    }

    @keyframes pulse {
      from {
        transform: scale(1.05);
        opacity: 1;
      }
      to {
        transform: scale(1);
        opacity: 0.2;
      }
    }

    /* === SHINY BUTTON === */
    .buy-button {
      position: relative;
      background: linear-gradient(45deg, #FF0000, #FF0000);
      color: white;
      padding: 14px;
      width: 100%;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255, 61, 0, 0.25);
      transition: transform 0.25s ease;
    }

    .buy-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0) 30%,
        rgba(255, 255, 255, 0.4) 50%,
        rgba(255, 255, 255, 0) 70%
      );
      animation: shine 2s ease-in-out infinite;
    }

    @keyframes shine {
      0% {
        left: -60%;
      }
      100% {
        left: 120%;
      }
    }

    .buy-button:hover {
      transform: scale(1.05);
      background: rgba(255, 0, 0, 0.6);
    }

    /* === POPUP MODAL === */
    .popup {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-content {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 300px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .fade-scale {
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .fade-scale.show {
      opacity: 1;
      transform: scale(1);
    }

    .success {
      color: #2e7d32;
      font-size: 1.7rem;
    }

    .failure {
      color: #d32f2f;
      font-size: 1.7rem;
    }

    .spinner {
      border: 8px solid #eee;
      border-top: 8px solid rgba(255, 0, 0, 1);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container" id="content">

  <div class="cart-btn-wrapper">
    <img src="img/search.png" alt="search" class="cart-btn" />
    <img src="img/cart.png" alt="cart" class="cart-btn" id="cart-btn" />  
  </div>
  <div id="cartMessage" class="warning-msg"> <p>Where are you going? The sale</p> <p> is about to end.</p></div>

  <div class="image-wrapper">
    <img src="img/kb.webp" alt="Product" class="product-image" />
    <div class="discount-sticker">60% OFF</div>
  </div>
    <div class="product-title">Odin 75 Limited Edition</div>
    <div class="product-description">
      🔥 Only 2 Left in Stock!<br />
      ⏳ Selling Out Fast!<br />
      🚨 Once it's gone, it's gone forever!
    </div>
    <div class="product-price">
      <span class="original-price">$99.99</span>
      <span class="discounted-price">$39.99</span>
    </div>
    <div class="countdown">Offer ends in <span id="timer">10</span> seconds ! ! ! </div>
    <button class="buy-button" id="buyBtn">BUY NOW</button>
  </div>

  <!-- Pop-up for Loading and Result -->
  <div class="popup" id="popup">
    <div class="popup-content" id="popupContent">
      <div class="spinner" id="spinner"></div>
      <div id="loadingText">Processing your purchase...</div>
    </div>
  </div>

  <script>
    let timeLeft = 10;
    const timerEl = document.getElementById("timer");
    const buyBtn = document.getElementById("buyBtn");

    const countdown = setInterval(() => {
      timeLeft -= 0.01;
      if (timeLeft <= 0) {
        clearInterval(countdown);
        timerEl.innerText = "0";
        document.querySelector(".countdown").innerText = "Offer ends in 0.00 seconds ! ! ! ";
        buyBtn.disabled = true;
        buyBtn.style.opacity = "0.6";
        buyBtn.innerText = "BUY NOW";

        setTimeout(() => {
          document.getElementById("content").style.display = "none";
          document.body.innerHTML = `
            <div style="text-align:center; padding:40px;">
                <h1 style="font-size:3rem; color:#666;">404</h1>
                <p style="font-size:1.5rem; color:#666;">Oops! This page no longer exists.</p>
                <button onclick="location.reload()" style="
                  margin-top: 20px;
                  padding: 12px 24px;
                  font-size: 1rem;
                  font-weight: bold;
                  color: white;
                  background-color: #d32f2f;
                  border: none;
                  border-radius: 6px;
                  cursor: pointer;
                ">Refresh Page</button>
              </div>`;
        }, 2500);
      } else {
        timerEl.innerText = timeLeft.toFixed(2);
      }
    }, 10);

    buyBtn.addEventListener("click", () => {
      clearInterval(countdown); // Stop countdown

      const popup = document.getElementById("popup");
      const popupContent = document.getElementById("popupContent");
      const spinner = document.getElementById("spinner");
      const loadingText = document.getElementById("loadingText");

      popup.style.display = "flex";
      spinner.style.display = "block";
      loadingText.innerHTML = "Processing your purchase...";
      loadingText.style.color = "#444";

      setTimeout(() => {
        const isSuccess = Math.random() < 0.5;

        spinner.style.display = "none";

        // Fade out old text
        loadingText.classList.remove("show");
        loadingText.classList.add("fade-scale");

        // Delay before injecting new message
        setTimeout(() => {
          if (isSuccess) {
            const successMessages = [
              "Congratulations, you got it! But… what is it, exactly?",
              "Wow. You won the race no one else was running.",
              "Enjoy your placebo. We just made 10,000 more.",
              "That’s it? That’s what made your heart race?"
            ];
            const randomMessage = successMessages[Math.floor(Math.random() * successMessages.length)];
            loadingText.innerHTML = `Purchase Success!<div style="margin-top: 8px; font-size:1.1rem; font-weight:normal;">${randomMessage}</div>`;
            loadingText.style.color = "green";
            popupContent.className = "popup-content success";
          } else {
            const failureMessages = [
              "Too slow. Better luck next time.",
              "Missed it. Feels familiar?",
              "You’re not important enough for exclusivity.",
              "It was never for you anyway."
            ];
            const randomFailure = failureMessages[Math.floor(Math.random() * failureMessages.length)];
            loadingText.innerHTML = `Out of Stock.<div style="margin-top: 8px; font-size:1.1rem; font-weight:normal;">${randomFailure}</div>`;
            loadingText.style.color = "red";
            popupContent.className = "popup-content failure";
          }

          // Fade in new message
          setTimeout(() => {
            loadingText.classList.add("show");
          }, 50); // slight delay so CSS triggers transition
        }, 300); // wait before replacing content

        setTimeout(() => {
          document.getElementById("content").style.display = "none";
          document.body.innerHTML = `
            <div style="text-align:center; padding:40px;">
              <h1 style="font-size:3rem; color:#666;">404</h1>
              <p style="font-size:1.5rem; color:#666;">Oops! This page no longer exists.</p>
              <button onclick="location.reload()" style="
                margin-top: 20px;
                padding: 12px 24px;
                font-size: 1rem;
                font-weight: bold;
                color: white;
                background-color: #d32f2f;
                border: none;
                border-radius: 6px;
                cursor: pointer;
              ">Refresh Page</button>
            </div>`;
        }, 8000); /*for the purchase description time*/
      }, 5000);  /*for the purchase processing time*/
    });

    const cartButtons = document.querySelectorAll(".cart-btn");
    const cartMessage = document.getElementById("cartMessage");
    const container = document.querySelector(".container");

    cartButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        // Show the warning message
        cartMessage.style.opacity = "1";

        // Add shake effect to container
        container.classList.add("shake");

        // Remove shake class after animation
        setTimeout(() => {
          container.classList.remove("shake");
        }, 500); // Match animation duration

        // Hide the message after 3 seconds
        setTimeout(() => {
          cartMessage.style.opacity = "0";
        }, 3000);
      });
    });

  </script>
</body>
</html>
